# MediaWiki with MariaDB
#
# Setup a custom entry in /etc/hosts for localhost (e.g. mediawiki)
# then access via "http://mediawiki"
#
# Edit the .env file with your PUBLIC_HOSTNAME 
#

services:
  mediawiki:
    build:
      context: .
      dockerfile: docker/Mediawiki.Dockerfile
      # These settings should match the wiki-database service variables
    restart: always
    # TODO: start here
    # command:
      # See also CMD, ENTRYPOINT
    depends_on:
      - wiki-database
    ports:
      - 80:80
    volumes:
      - ./mediawiki/images:/var/www/html/images
      - ./mediawiki/extensions:/var/www/html/extensions
      - ./clicklaw/defaults/LocalSettings.php:/var/www/html/defaults/LocalSettings.php
      - ./clicklaw/init.sh:/init.sh
      - ./cache:/app/cache
        #entrypoint:
        # - /init.sh
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME}
      WIKI_NAME: ${WIKI_NAME}
      WIKI_ADMIN_PASSWORD: ${WIKI_ADMIN_PASSWORD}
      DB_SERVER: ${DB_SERVER}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      #command: sh -c /init.sh
      #- apache2-foreground;


  wiki-database:
    image: mariadb:11.6.2
    restart: always
    environment:
      MARIADB_DATABASE: wikidb
      MARIADB_USER: wikiuser
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: password
    ports:
      - 3306:3306
    volumes:
      - db:/var/lib/mysql
  
        #  wiki-init:
        #    build:
        #      context: .
        #      dockerfile: docker/Clicklaw.Dockerfile
        #    volumes:
        #      - ./clicklaw/init.sh:/init.sh
        #    depends_on:
        #      - wiki-database
        #    environment:
        #      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME}
        #      WIKI_NAME: ${WIKI_NAME}
        #      WIKI_ADMIN_PASSWORD: ${WIKI_ADMIN_PASSWORD}
        #      DB_SERVER: ${DB_SERVER}
        #      DB_NAME: ${DB_NAME}
        #      DB_USER: ${DB_USER}
        #      DB_PASSWORD: ${DB_PASSWORD}
        #      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
        #    command: sh -c /init.sh

  base:
    build:
      context: .
      dockerfile: docker/Dockerfile.base
    image: mw-base


volumes:
  db:
  mediawiki:

