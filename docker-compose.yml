# MediaWiki with MariaDB
#
# Setup a custom entry in /etc/hosts for localhost (e.g. mediawiki)
# then access via "http://mediawiki"
#
# Edit the .env file with your PUBLIC_HOSTNAME 
#

services:
  mediawiki:
    build:
      context: .
      dockerfile: docker/Mediawiki.Dockerfile
      # These settings should match the wiki-database service variables
      args:
        WIKI_NAME: My Wiki
        WIKI_ADMIN_PASSWORD: asdf!@#%ASDF1234
        PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME}
        DB_SERVER: wiki-database
        DB_NAME: wikidb
        DB_USER: wikiuser
        DB_PASSWORD: password
        DB_ROOT_PASSWORD: password
    restart: always
    depends_on:
      - wiki-database
    ports:
      - 80:80
    networks:
      - mw-network
    volumes:
      - ./mediawiki/images:/var/www/html/images
      - ./mediawiki/LocalSettings.php:/var/www/html/LocalSettings.php
      - ./mediawiki/extensions:/var/www/html/extensions
      - ./cache:/app/cache

  wiki-database:
    image: mariadb:11.6.2
    restart: always
    environment:
      MARIADB_DATABASE: wikidb
      MARIADB_USER: wikiuser
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: password
    ports:
      - 3306:3306
    networks:
      - mw-network
    volumes:
      - db:/var/lib/mysql

  base:
    build:
      context: .
      dockerfile: docker/Dockerfile.base
    image: mw-base

  q_serve:
    build:
      context: .
      dockerfile: docker/QServe.Dockerfile
    ports:
      - "8090:8090"
    networks:
      - mw-network
    depends_on:
      - base
    expose:
      - "8090"

  job_dispatcher:
    build:
      context: .
      dockerfile: docker/JobDispatcher.Dockerfile
    ports:
      - "8899:8899"
    networks:
      - mw-network
    depends_on:
      - base
      - q_serve
    expose:
      - "8899"

  zip_worker:
    build:
      context: .
      dockerfile: docker/Worker.Dockerfile
    command: >
      nslave 
      --cachedir /app/cache 
      --host q_serve 
      --port 8090
      --numprocs 2 
      -c makezip
    depends_on:
      - base
      - q_serve
    networks:
      - mw-network
    volumes:
      - ./cache:/app/cache
      
  render_worker:
    build:
      context: .
      dockerfile: docker/Worker.Dockerfile
    depends_on:
      - base
      - q_serve
    command: >
      nslave
      --cachedir /app/cache
      --host q_serve
      --port 8090
      --numprocs 2
      --url http://render_worker:9123/cache
      -s makezip
    networks:
      - mw-network
    volumes:
      - ./cache:/app/cache

volumes:
  db:
  mediawiki:

networks:
  mw-network:
    driver: bridge

